---
layout: default
---

<article>
  <header>
    <h1>{{ page.title }}</h1>
    <p style="font-size: 0.9rem; color: #666;">
      Pubblicato il <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%d %B %Y" }}</time>
    </p>
  </header>

  <div style="margin-top: 30px; line-height: 1.8; font-size: 1.05rem;">
    {{ content }}
  </div>

  <footer style="margin-top: 50px; padding-top: 20px; border-top: 1px solid #ddd;">
    <p><a href="/blog/">← Torna al blog</a></p>
  </footer>
</article>
