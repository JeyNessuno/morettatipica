<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Schedule</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .schedule-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .month-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .month-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .month-header {
            padding: 20px;
            font-size: 1.5em;
            font-weight: bold;
            color: white;
            text-align: center;
        }

        .activities {
            padding: 20px;
        }

        .activity {
            display: flex;
            align-items: flex-start;
            margin-bottom: 15px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            transition: all 0.3s ease;
        }

        .activity:hover {
            background: #e9ecef;
            border-left-color: #764ba2;
        }

        .activity-bullet {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #667eea;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            flex-shrink: 0;
            font-size: 0.8em;
            font-weight: bold;
        }

        .activity-content {
            flex: 1;
        }

        .activity-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 4px;
        }

        .activity-description {
            font-size: 0.9em;
            color: #666;
            line-height: 1.4;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2em;
            padding: 40px;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            text-align: center;
        }

        .month-colors {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            padding: 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            margin-top: 40px;
        }

        .color-legend {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
        }

        .color-box {
            width: 30px;
            height: 30px;
            border-radius: 6px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .empty-state h2 {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📅 Daily Schedule</h1>
        <div id="content">
            <div class="loading">Loading schedule...</div>
        </div>
    </div>

    <script>
        // Configuration - Replace with your Google Sheet ID and range
        const GOOGLE_SHEET_ID = '1Ek-POZ4hQkoHT54l82IPrp3k3g_Ve6x08lwLOLC17ag';
        const SHEET_RANGE = 'Sheet1!A1:E100'; // Adjust range as needed
        
        // Color palette for months
        const monthColors = {
            'January': '#FF6B6B',
            'February': '#4ECDC4',
            'March': '#45B7D1',
            'April': '#FFA07A',
            'May': '#98D8C8',
            'June': '#F7DC6F',
            'July': '#BB8FCE',
            'August': '#85C1E2',
            'September': '#F8B88B',
            'October': '#A8D8EA',
            'November': '#AA96DA',
            'December': '#FCBAD3'
        };

        async function fetchGoogleSheet() {
            try {
                // Using CSV export URL from Google Sheets
                const csvUrl = `https://docs.google.com/spreadsheets/d/${GOOGLE_SHEET_ID}/export?format=csv&gid=0`;
                const response = await fetch(csvUrl);
                
                if (!response.ok) {
                    throw new Error('Failed to fetch Google Sheet');
                }

                const csvText = await response.text();
                return parseCSV(csvText);
            } catch (error) {
                console.error('Error fetching sheet:', error);
                throw error;
            }
        }

        function parseCSV(csvText) {
            const lines = csvText.trim().split('\n');
            const data = {};

            // Skip header row (line 0)
            for (let i = 1; i < lines.length; i++) {
                const parts = lines[i].split(',').map(s => s.trim().replace(/^"|"$/g, ''));
                
                if (parts.length >= 2) {
                    const month = parts[0];
                    const activity = parts[1];
                    const description = parts[2] || '';

                    if (!data[month]) {
                        data[month] = [];
                    }

                    data[month].push({
                        name: activity,
                        description: description
                    });
                }
            }

            return data;
        }

        function createColorLegend(data) {
            const months = Object.keys(data);
            const uniqueMonths = [...new Set(months)];
            
            let html = '<div class="month-colors">';
            uniqueMonths.forEach(month => {
                if (monthColors[month]) {
                    html += `
                        <div class="color-legend">
                            <div class="color-box" style="background-color: ${monthColors[month]}"></div>
                            <span>${month}</span>
                        </div>
                    `;
                }
            });
            html += '</div>';
            return html;
        }

        function renderSchedule(data) {
            const months = Object.keys(data);
            
            if (months.length === 0) {
                document.getElementById('content').innerHTML = `
                    <div class="empty-state">
                        <h2>No schedule data found</h2>
                        <p>Make sure your Google Sheet is properly configured and shared.</p>
                    </div>
                `;
                return;
            }

            let html = '<div class="schedule-grid">';

            months.forEach(month => {
                const activities = data[month];
                const color = monthColors[month] || '#667eea';

                html += `
                    <div class="month-card">
                        <div class="month-header" style="background-color: ${color}">
                            ${month}
                        </div>
                        <div class="activities">
                `;

                activities.forEach((activity, index) => {
                    html += `
                        <div class="activity">
                            <div class="activity-bullet" style="background-color: ${color}">${index + 1}</div>
                            <div class="activity-content">
                                <div class="activity-name">${activity.name}</div>
                                ${activity.description ? `<div class="activity-description">${activity.description}</div>` : ''}
                            </div>
                        </div>
                    `;
                });

                html += `
                        </div>
                    </div>
                `;
            });

            html += '</div>';
            html += createColorLegend(data);

            document.getElementById('content').innerHTML = html;
        }

        // Initialize
        async function init() {
            try {
                const data = await fetchGoogleSheet();
                renderSchedule(data);
            } catch (error) {
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <strong>Error loading schedule:</strong> Make sure you've configured the Google Sheet ID and that it's publicly accessible.
                    </div>
                `;
            }
        }

        // Load schedule when page loads
        window.addEventListener('load', init);
    </script>
</body>
</html>
