backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "Posts"
    folder: "_posts"
    # Jekyll requires posts in _posts/ directory for GitHub Pages
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    # File naming follows Jekyll convention: YYYY-MM-DD-slug.md

    fields:
      - label: "Layout"
        name: "layout"
        widget: "hidden"
        default: "post"

      - label: "Title"
        name: "title"
        widget: "string"
        required: true

      - label: "Date"
        name: "date"
        widget: "datetime"
        required: true

      - label: "Body"
        name: "body"
        widget: "markdown"
        required: true
